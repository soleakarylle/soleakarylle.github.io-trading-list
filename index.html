
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vndyne's Trading List</title>
<link rel="stylesheet" href="style.css">
<script src="data.js"></script>
</head>
<body>

<header>
<h1>Vndyne's Trading List</h1>
<p class="subtitle">Welcome! This site contains my personal trading archive exported from Encora.</p>
</header>

<div class="controls">
<input id="search" placeholder="Search shows, cast, year..." />

<select id="showFilter">
<option value="">All Shows</option>
</select>

<select id="yearFilter">
<option value="">All Years</option>
</select>

<select id="formatFilter">
<option value="">All Formats</option>
<option value="Video">Video</option>
<option value="Audio">Audio</option>
<option value="Proshot">Proshot</option>
</select>
</div>

<div id="list"></div>

<div id="popup" class="popup hidden">
<div class="popup-content">
<span id="close">&times;</span>
<h2 id="popupTitle"></h2>
<p id="popupDetails"></p>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
